version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: thz-postgres
    environment:
      POSTGRES_DB: thz_db
      POSTGRES_USER: thz_user
      POSTGRES_PASSWORD: thz_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thz_user -d thz_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thz-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: thz-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thz-network

  redis:
    image: redis:7-alpine
    container_name: thz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - thz-network

  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    container_name: thz-go-backend
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: thz_user
      DB_PASSWORD: thz_password
      DB_NAME: thz_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: thz_tasks
      RABBITMQ_RESULT_QUEUE: thz_results
      RABBITMQ_DIFF_QUEUE: thz_diff_tasks
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: 86400
      ENABLE_CACHE: "true"
      METRICS_PORT: 9090
      ENABLE_METRICS: "true"
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - thz-network

  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    container_name: thz-python-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TASK_QUEUE: thz_tasks
      RESULT_QUEUE: thz_results
      DIFF_TASK_QUEUE: thz_diff_tasks
      DIFF_RESULT_QUEUE: thz_diff_tasks_results
      ONNX_MODEL_PATH: /app/models/plsr_model.onnx
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      REDIS_URL: redis://redis:6379/0
      ENABLE_CACHE: "true"
      CACHE_TTL_SECONDS: 86400
      ENABLE_METRICS: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
    restart: unless-stopped
    networks:
      - thz-network
    command: ["python", "worker.py", "--threads", "2"]

  prometheus:
    image: prom/prometheus:latest
    container_name: thz-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - go-backend
    networks:
      - thz-network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:

networks:
  thz-network:
    driver: bridge
