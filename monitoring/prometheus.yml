global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'thz-go-backend'
    static_configs:
      - targets: ['go-backend:9090']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'thz-python-workers'
    static_configs:
      - targets: ['python-worker:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    honor_labels: true
